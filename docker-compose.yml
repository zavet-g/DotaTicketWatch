services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - FLARESOLVERR_URL=http://flaresolverr:8191
    volumes:
      - ./data:/app/data
    mem_limit: 256m
    depends_on:
      flaresolverr:
        condition: service_healthy
        required: false

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: unless-stopped
    environment:
      - LOG_LEVEL=warn
      - DISABLE_MEDIA=true
    mem_limit: 1g
    profiles:
      - flaresolverr
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -X POST http://localhost:8191/v1 -H 'Content-Type: application/json' -d '{\"cmd\":\"sessions.list\"}' > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
