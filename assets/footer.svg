<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 80" width="900" height="80">

  <rect width="900" height="80" fill="#000"/>

  <defs>
    <pattern id="scan" x="0" y="0" width="900" height="4" patternUnits="userSpaceOnUse">
      <rect width="900" height="1" fill="rgba(255,255,255,0.018)"/>
    </pattern>
    <style>
      .ft { animation: fpulse 20s ease-in-out infinite }
      @keyframes fpulse {
        0%,10%  { opacity: 0 }
        30%,70% { opacity: 1 }
        90%,100%{ opacity: 0 }
      }
    </style>
  </defs>

  <rect width="900" height="80" fill="url(#scan)"/>

  <!-- top separator -->
  <line x1="20" y1="2" x2="880" y2="2" stroke="#0f0f0f" stroke-width="1"/>

  <text class="ft"
    x="450" y="36"
    text-anchor="middle"
    font-family="monospace"
    font-size="10"
    fill="#282828"
    letter-spacing="5">SHANGHAI  ·  ORIENTAL SPORTS CENTER  ·  AUG 2026</text>

  <text class="ft"
    x="450" y="58"
    text-anchor="middle"
    font-family="monospace"
    font-size="9"
    fill="#181818"
    letter-spacing="10">T I  2 0 2 6</text>

</svg>
