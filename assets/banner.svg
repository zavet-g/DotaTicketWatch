<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <!-- base -->
  <rect width="900" height="200" fill="#000000"/>

  <!-- scanline texture -->
  <defs>
    <pattern id="scan" x="0" y="0" width="900" height="4" patternUnits="userSpaceOnUse">
      <rect width="900" height="1" y="0" fill="rgba(255,255,255,0.028)"/>
    </pattern>
  </defs>
  <rect width="900" height="200" fill="url(#scan)"/>

  <!-- top edge accent -->
  <line x1="0" y1="0" x2="900" y2="0" stroke="#1a1a1a" stroke-width="2"/>

  <!-- left + right margin marks -->
  <line x1="60" y1="30" x2="60" y2="170" stroke="#111111" stroke-width="1"/>
  <line x1="840" y1="30" x2="840" y2="170" stroke="#111111" stroke-width="1"/>

  <!-- main title -->
  <text x="450" y="96"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="50"
    font-weight="900"
    fill="#ffffff"
    letter-spacing="9">
    DOTATICKETWATCH
  </text>

  <!-- blinking cursor -->
  <style>
    .cur { animation: blink 1.1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
  <text x="851" y="96"
    font-family="'Courier New', Courier, monospace"
    font-size="50"
    font-weight="900"
    fill="#333333"
    class="cur">▮</text>

  <!-- divider -->
  <line x1="80" y1="118" x2="820" y2="118" stroke="#1e1e1e" stroke-width="1"/>

  <!-- subtitle -->
  <text x="450" y="148"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="11"
    fill="#444444"
    letter-spacing="5">
    TI  2026  ·  SHANGHAI  ·  ORIENTAL SPORTS CENTER  ·  AUG 2026
  </text>

  <!-- bottom edge accent -->
  <line x1="0" y1="199" x2="900" y2="199" stroke="#111111" stroke-width="1"/>
</svg>
